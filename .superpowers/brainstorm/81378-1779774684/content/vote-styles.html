<h2>投票按钮风格</h2>
<p class="subtitle">机会卡片底部，投票区域应该长什么样？</p>

<div class="cards">

  <!-- Option A -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="card-image" style="padding:16px;background:#fafafa;border-bottom:1px solid #eee;">
      <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:16px 20px;font-family:sans-serif;">
        <div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">收益模式 · 订阅制，目标月收 3000 元</div>
        <div style="border-top:1px solid #f0f0f0;padding-top:12px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;color:#9ca3af;">这个机会有价值吗？</span>
          <div style="display:flex;gap:8px;">
            <button style="border:1px solid #e5e7eb;background:white;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;">👍 <span style="color:#374151;">有价值</span></button>
            <button style="border:1px solid #e5e7eb;background:white;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;">👎 <span style="color:#374151;">不靠谱</span></button>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>文字按钮 + 图标</h3>
      <p>低调内敛，与卡片风格一致。投票后显示"78% 认为有价值"</p>
    </div>
  </div>

  <!-- Option B -->
  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="card-image" style="padding:16px;background:#fafafa;border-bottom:1px solid #eee;">
      <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:16px 20px;font-family:sans-serif;">
        <div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;">收益模式 · 订阅制，目标月收 3000 元</div>
        <div style="border-top:1px solid #f0f0f0;padding-top:12px;display:flex;align-items:center;gap:12px;">
          <span style="font-size:12px;color:#9ca3af;flex:1;">对你有帮助吗？</span>
          <button style="border:none;background:#f0fdf4;border-radius:20px;padding:7px 16px;font-size:14px;cursor:pointer;color:#16a34a;font-weight:600;">👍 32</button>
          <button style="border:none;background:#fef2f2;border-radius:20px;padding:7px 16px;font-size:14px;cursor:pointer;color:#dc2626;font-weight:600;">👎 8</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>彩色胶囊 + 实时计数</h3>
      <p>醒目活泼，投票数量始终可见，有社交感</p>
    </div>
  </div>

  <!-- Option C -->
  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="card-image" style="padding:16px;background:#fafafa;border-bottom:1px solid #eee;">
      <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;font-family:sans-serif;overflow:hidden;">
        <div style="padding:16px 20px;">
          <div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;">收益模式 · 订阅制，目标月收 3000 元</div>
        </div>
        <div style="background:#f9f7ff;border-top:1px solid #ede9fe;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;">
          <div style="display:flex;gap:6px;">
            <button style="border:1.5px solid #7c3aed;background:white;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#7c3aed;font-weight:600;">👍 有价值</button>
            <button style="border:1.5px solid #e5e7eb;background:white;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#9ca3af;">👎 不靠谱</button>
          </div>
          <span style="font-size:11px;color:#a78bfa;">已有 40 人评价</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>紫色强调底栏</h3>
      <p>与主题色一致，底栏视觉上与卡片主体分离，层次感强</p>
    </div>
  </div>

</div>
